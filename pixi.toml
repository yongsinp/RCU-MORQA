[workspace]
name = "morqa-rcu"
version = "0.1.0"
description = "Medical Open-Response Question Answering Response Content Units"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[tasks]
test = "python -m pytest tests/"
test-verbose = "python -m pytest tests/ -v"
analyze = "python -m src.preprocess.analyze"
eval-iaa-classification = "python -m src.eval.iaa_classification_eval"
similarity-biobert = "python -m src.similarity.biobert"
similarity-tfidf = "python -m src.similarity.tfidf"

[dependencies]
python = ">=3.10,<3.13"
pip = "*"

[pypi-dependencies]
scikit-learn = "~=1.7.2"
tiktoken = "~=0.12.0"
openai = "~=2.9.0"
tqdm = "~=4.67.1"
transformers = "~=4.57.3"
spacy = "~=3.8.11"
numpy = "~=2.3.5"
sentence-transformers = "~=5.2.0"
pytest = ">=8,<9"
click = ">=8,<9"
